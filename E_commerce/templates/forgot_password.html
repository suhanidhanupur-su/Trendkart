{% extends 'base.html' %}
{% block content %}

<div class="container mt-5 mb-5" style="max-width:420px;">
    <div style="background:#fff;border-radius:16px;padding:36px 32px;
                border:1.5px solid #FF4F81;
                box-shadow:0 4px 18px rgba(255,79,129,0.1);">

        <div class="text-center mb-4">
            <div style="font-size:48px;">🔐</div>
            <h2 class="fw-bold mt-2" style="color:#FF4F81;">Forgot Password?</h2>
            <p style="color:#888;font-size:13px;">
                Enter your email — we'll send you an OTP to reset your password.
            </p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert {% if 'bheja' in message.tags %}alert-success{% else %}alert-danger{% endif %} text-center py-2"
             style="font-size:13px;">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <label style="font-size:12px;font-weight:600;color:#FF4F81;">EMAIL ADDRESS</label>
            <input type="email" name="email"
                   placeholder="aapka@email.com"
                   class="form-control mt-1 mb-4"
                   style="border:1.5px solid #ffc0d1;background:#FFF5F7;
                          border-radius:8px;padding:11px 14px;"
                   required autofocus>

            <button type="submit"
                    style="width:100%;background:#FF4F81;color:#fff;border:none;
                           border-radius:10px;padding:12px;font-size:15px;
                           font-weight:700;cursor:pointer;">
                Send OTP →
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'login' %}"
               style="color:#aaa;font-size:12px;text-decoration:none;">
                ← Back to Login
            </a>
        </div>
    </div>
</div>

{% endblock %}
