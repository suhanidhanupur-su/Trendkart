{% extends 'base.html' %}
{% block content %}

<div class="container mt-5 mb-5" style="max-width:420px;">
    <div style="background:#fff;border-radius:16px;padding:36px 32px;
                border:1.5px solid #FF4F81;
                box-shadow:0 4px 18px rgba(255,79,129,0.1);">

        <div class="text-center mb-4">
            <div style="font-size:48px;">🔑</div>
            <h2 class="fw-bold mt-2" style="color:#FF4F81;">New Password</h2>
            <p style="color:#888;font-size:13px;">
                Create a strong new password for your account.
            </p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger text-center py-2" style="font-size:13px;">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label style="font-size:12px;font-weight:600;color:#FF4F81;">NEW PASSWORD</label>
            <input type="password" name="password"
                   placeholder="Naya password"
                   class="form-control mt-1 mb-3"
                   style="border:1.5px solid #ffc0d1;background:#FFF5F7;
                          border-radius:8px;padding:11px 14px;"
                   required>

            <label style="font-size:12px;font-weight:600;color:#FF4F81;">CONFIRM PASSWORD</label>
            <input type="password" name="confirm_password"
                   placeholder="Password dobara likhao"
                   class="form-control mt-1 mb-4"
                   style="border:1.5px solid #ffc0d1;background:#FFF5F7;
                          border-radius:8px;padding:11px 14px;"
                   required>

            <button type="submit"
                    style="width:100%;background:#FF4F81;color:#fff;border:none;
                           border-radius:10px;padding:12px;font-size:15px;
                           font-weight:700;cursor:pointer;">
                🔐 Reset Password
            </button>
        </form>

    </div>
</div>

{% endblock %}
